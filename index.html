<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級數學：小數點挑戰賽 - 陳俊諺老師製作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --cell-size: 3rem;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        /* 連擊時的背景特效 */
        body.combo-active {
            background: radial-gradient(circle at center, #eef2ff 0%, #e0e7ff 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .math-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Roboto Mono', monospace;
            font-size: 3.5rem;
            color: #1e293b;
            gap: 0.25rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.05);
        }

        .math-row {
            display: flex;
            align-items: center;
            height: 4rem;
            position: relative;
        }

        .digit {
            width: var(--cell-size);
            text-align: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.2s;
        }

        .static-dot {
            position: absolute;
            left: -0.4rem;
            bottom: 0.2rem;
            font-weight: 900;
            color: var(--primary);
            font-size: 2.8rem;
        }

        .dot-trigger {
            position: absolute;
            left: -0.5rem;
            width: 1rem;
            height: 100%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            padding-bottom: 0.5rem;
        }

        .dot-trigger::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #e2e8f0;
            border-radius: 50%;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0;
            transform: scale(0.5);
        }

        .dot-trigger:hover::after { 
            opacity: 1; 
            background: #cbd5e1; 
            transform: scale(1.2);
        }

        .correct-dot::after { 
            opacity: 1 !important; 
            background: var(--success) !important; 
            transform: scale(2.2) !important; 
            box-shadow: 0 0 15px var(--success); 
        }

        .wrong-dot::after { 
            opacity: 1 !important; 
            background: var(--error) !important; 
            transform: scale(2.2) !important; 
            box-shadow: 0 0 15px var(--error);
        }

        .zero-pad { color: #cbd5e1; font-style: italic; opacity: 0.6; }

        .math-line {
            width: 115%;
            height: 5px;
            background: #334155;
            margin: 0.5rem 0;
            border-radius: 10px;
        }

        .operator {
            position: absolute;
            left: -3.5rem;
            color: #94a3b8;
            font-size: 2.5rem;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(to right, #6366f1, #a855f7);
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
            transition: width 0.1s linear;
        }

        .ai-glow { box-shadow: 0 0 20px rgba(139, 92, 246, 0.2); border: 1px solid rgba(139, 92, 246, 0.3); }

        /* 答對時的震動 */
        @keyframes successPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }
        .success-animate { animation: successPop 0.4s ease; }

        /* 答錯時的抖動 */
        @keyframes shakeError {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-10px); }
            40%, 80% { transform: translateX(10px); }
        }
        .error-shake { animation: shakeError 0.4s ease-in-out; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="main-card" class="glass-card rounded-[3rem] p-10 w-full max-w-xl relative overflow-hidden transition-all duration-300">
        
        <div id="game-timer-container" class="hidden absolute top-0 left-0 w-full h-3 bg-slate-100">
            <div id="game-timer-fill" class="timer-progress w-full"></div>
        </div>

        <!-- 開始畫面 -->
        <div id="start-screen" class="text-center space-y-8 py-6">
            <div class="space-y-3">
                <div class="inline-block bg-indigo-100 text-indigo-700 px-4 py-1 rounded-full text-sm font-bold animate__animated animate__fadeInDown">小學五年級專屬</div>
                <h1 class="text-5xl font-black text-slate-800 tracking-tight leading-tight">小數點挑戰賽</h1>
                <p class="text-slate-500 font-medium">✨ 視覺強化版 • 讓數學更有趣</p>
                <div class="inline-block bg-white border border-indigo-200 px-6 py-2 rounded-2xl text-base font-bold text-indigo-600 mt-6 shadow-sm">
                    製作人：陳俊諺 老師
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-5 pt-4">
                <button onclick="startGame('normal', 5)" class="group relative flex items-center justify-between bg-white border-2 border-slate-200 p-6 rounded-3xl hover:border-indigo-500 hover:bg-indigo-50 transition-all transform hover:-translate-y-1">
                    <div class="text-left">
                        <span class="block text-indigo-700 font-bold text-xl">標準練習</span>
                        <span class="text-slate-400 text-sm">精確完成 5 道練習題</span>
                    </div>
                    <div class="bg-indigo-100 p-3 rounded-2xl group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                        <span class="text-2xl">🎯</span>
                    </div>
                </button>
                <button onclick="startGame('timed', 60)" class="group relative flex items-center justify-between bg-indigo-600 p-6 rounded-3xl hover:bg-indigo-700 transition-all transform hover:-translate-y-1 shadow-xl shadow-indigo-200">
                    <div class="text-left text-white">
                        <span class="block font-bold text-xl">限時 1 分鐘</span>
                        <span class="text-indigo-100 text-sm">追求最高連擊 (Combo)</span>
                    </div>
                    <div class="bg-white/20 p-3 rounded-2xl group-hover:bg-white group-hover:text-indigo-600 transition-colors">
                        <span class="text-2xl">⚡</span>
                    </div>
                </button>
            </div>
        </div>

        <!-- 遊戲畫面 -->
        <div id="game-screen" class="hidden space-y-8 animate__animated animate__fadeIn">
            <div class="flex justify-between items-end">
                <div class="relative">
                    <p id="mode-label" class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-1">MODE</p>
                    <div id="round-container" class="flex items-baseline gap-3">
                        <p id="round-info" class="text-4xl font-black text-slate-800">1 / 5</p>
                        <p id="combo-display" class="text-2xl font-black text-amber-500 hidden"></p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="score-label" class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Time Left</p>
                    <p id="time-display" class="font-mono text-3xl font-black text-indigo-600">60.0s</p>
                </div>
            </div>

            <div id="math-area" class="bg-slate-50 rounded-[2.5rem] p-12 border border-slate-200 flex justify-center items-center min-h-[400px] relative transition-all duration-300">
                <!-- 直式生成區域 -->
            </div>

            <div class="space-y-4">
                <button id="no-dot-btn" onclick="handleDotClick(null, 0)" class="w-full py-5 bg-white text-slate-600 font-bold rounded-3xl border-2 border-slate-200 hover:border-indigo-400 hover:text-indigo-600 transition-all shadow-sm">
                    結果為整數 (不需點小數點)
                </button>
                <div class="flex items-center justify-center min-h-[30px]">
                    <span id="feedback" class="text-center font-black tracking-wide text-lg"></span>
                </div>
            </div>
        </div>

        <!-- 結果畫面 -->
        <div id="result-screen" class="hidden text-center space-y-6 animate__animated animate__zoomIn">
            <div id="result-emoji" class="text-8xl">🎊</div>
            <h3 class="text-4xl font-black text-slate-800">挑戰成果</h3>
            
            <div class="bg-white p-8 rounded-[2.5rem] border-2 border-slate-100 grid grid-cols-2 gap-6 shadow-sm">
                <div>
                    <p class="text-sm font-bold text-indigo-400 uppercase mb-1">總得分</p>
                    <p id="final-score" class="text-5xl font-black text-slate-800">0</p>
                </div>
                <div>
                    <p class="text-sm font-bold text-indigo-400 uppercase mb-1">最高連擊</p>
                    <p id="final-combo" class="text-5xl font-black text-slate-800">0</p>
                </div>
            </div>

            <!-- AI 智慧分析區 -->
            <div id="ai-analysis-box" class="ai-glow bg-violet-50 p-7 rounded-[2.5rem] text-left relative overflow-hidden">
                <h4 class="text-sm font-bold text-violet-600 mb-3 flex items-center gap-2">
                    <span class="bg-violet-200 p-1.5 rounded-lg text-xs">✨</span> Gemini 智慧建議
                </h4>
                <div id="ai-loading" class="text-violet-400 text-sm font-medium">
                    正在運算分析中<span class="loading-dots"></span>
                </div>
                <p id="ai-text" class="text-slate-700 text-base leading-relaxed font-medium"></p>
                <button id="ai-tts-btn" onclick="speakAI()" class="hidden mt-4 text-xs bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-all flex items-center gap-2">
                    🔊 聽聽 AI 老師的點評 (廣東話)
                </button>
            </div>

            <div class="flex flex-col gap-4 pt-4">
                <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-3xl hover:bg-slate-800 transition-all shadow-xl">重新挑戰</button>
                <p class="text-sm font-bold text-slate-400">
                    製作人：陳俊諺 老師
                </p>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let gameMode = 'normal', timeLeft = 60, score = 0, totalAnswered = 0, roundCount = 0, maxRounds = 5;
        let combo = 0, maxCombo = 0;
        let currentProblem = null, timerInterval = null, gameActive = false;
        let history = []; 

        function triggerConfetti() {
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#4f46e5', '#10b981', '#fbbf24']
            });
        }

        function generateProblem() {
            const isSpecial = Math.random() < 0.35;
            let top, bottom;
            if (isSpecial) {
                const pairs = [[25, 4], [125, 8], [5, 2], [15, 6], [75, 4]];
                const pair = pairs[Math.floor(Math.random() * pairs.length)];
                const d1 = Math.floor(Math.random() * 3);
                const d2 = Math.floor(Math.random() * 3) + 1;
                top = (pair[0] / Math.pow(10, d1)).toString();
                bottom = (pair[1] / Math.pow(10, d2)).toString();
            } else {
                top = (Math.floor(Math.random() * 900 + 10) / 100).toString();
                bottom = (Math.floor(Math.random() * 90 + 2) / 10).toString();
            }
            const sTop = top.replace('.', ''), sBottom = bottom.replace('.', '');
            const rawProd = (BigInt(sTop) * BigInt(sBottom)).toString();
            const dTop = (top.split('.')[1] || "").length, dBottom = (bottom.split('.')[1] || "").length;
            const correctPos = dTop + dBottom;
            return { top, bottom, rawProd, correctPos };
        }

        function startGame(mode, val) {
            gameMode = mode; gameActive = true; score = 0; totalAnswered = 0; roundCount = 0; combo = 0; maxCombo = 0; history = [];
            if (mode === 'timed') { 
                timeLeft = val; maxRounds = 999; startTimer(); 
                document.getElementById('mode-label').innerText = "限時連擊模式";
                document.getElementById('score-label').innerText = "倒數計時";
                document.getElementById('round-info').innerText = "Score: 0";
                document.getElementById('combo-display').classList.remove('hidden');
            } else { 
                maxRounds = val; 
                document.getElementById('mode-label').innerText = "精準練習模式";
                document.getElementById('score-label').innerText = "目前進度";
                document.getElementById('round-info').innerText = `1 / ${maxRounds}`;
                document.getElementById('time-display').innerText = "-";
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-timer-container').classList.toggle('hidden', mode !== 'timed');
            nextRound();
        }

        function startTimer() {
            const startVal = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) { timeLeft = 0; endGame(); }
                document.getElementById('time-display').innerText = timeLeft.toFixed(1) + 's';
                document.getElementById('game-timer-fill').style.width = (timeLeft / startVal * 100) + '%';
            }, 100);
        }

        function nextRound() {
            if (gameMode === 'normal' && roundCount >= maxRounds) { endGame(); return; }
            roundCount++;
            if (gameMode === 'normal') document.getElementById('round-info').innerText = `${roundCount} / ${maxRounds}`;
            currentProblem = generateProblem();
            renderProblem();
        }

        function renderProblem() {
            const area = document.getElementById('math-area');
            const p = currentProblem;
            const minNeededLen = p.correctPos + 1;
            const fullProdStr = p.rawProd.padStart(minNeededLen, '0');
            const originalLen = p.rawProd.length;

            let html = `<div id="math-display" class="math-container animate__animated animate__zoomIn">`;
            html += `<div class="math-row">${renderDigitsWithDot(p.top)}</div>`;
            html += `<div class="math-row"><span class="operator">×</span>${renderDigitsWithDot(p.bottom)}</div>`;
            html += `<div class="math-line"></div>`;
            html += `<div class="math-row">`;
            const digits = fullProdStr.split('');
            digits.forEach((d, i) => {
                const posFromRight = digits.length - i;
                const isPad = (i < fullProdStr.length - originalLen);
                html += `<div class="digit ${isPad ? 'zero-pad' : ''}">
                            ${posFromRight > 0 ? `<div class="dot-trigger" id="pos-${posFromRight}" onclick="handleDotClick(this, ${posFromRight})"></div>` : ''}
                            ${d}
                         </div>`;
            });
            html += `</div></div>`;
            area.innerHTML = html;
        }

        function renderDigitsWithDot(str) {
            const parts = str.split('.');
            let res = "";
            const leftDigits = parts[0].split('');
            leftDigits.forEach(d => { res += `<div class="digit">${d}</div>`; });
            if (parts.length > 1) {
                const rightDigits = parts[1].split('');
                rightDigits.forEach((d, i) => {
                    res += `<div class="digit">${i === 0 ? '<span class="static-dot">.</span>' : ''}${d}</div>`;
                });
            }
            return res;
        }

        function handleDotClick(el, idx) {
            if (!gameActive || document.getElementById('feedback').classList.contains('locked')) return;
            
            const isCorrect = idx === currentProblem.correctPos;
            const feedback = document.getElementById('feedback');
            const mainCard = document.getElementById('main-card');
            const mathDisplay = document.getElementById('math-display');
            
            feedback.classList.add('locked');
            totalAnswered++;

            history.push({ prob: `${currentProblem.top} x ${currentProblem.bottom}`, correct: isCorrect });

            if (isCorrect) {
                score++; combo++;
                if (combo > maxCombo) maxCombo = combo;
                
                // 正確特效
                if (el) el.classList.add('correct-dot');
                triggerConfetti();
                mainCard.classList.add('success-animate');
                setTimeout(() => mainCard.classList.remove('success-animate'), 400);

                if (combo >= 3) document.body.classList.add('combo-active');

                if (gameMode === 'timed') {
                    document.getElementById('round-info').innerText = `Score: ${score}`;
                    const comboEl = document.getElementById('combo-display');
                    comboEl.innerText = `${combo} Combo!`;
                    comboEl.className = "text-2xl font-black text-amber-500 animate__animated animate__bounceIn";
                }

                feedback.innerText = combo > 1 ? `✨ 連擊 ${combo}！太強了 ✨` : "🎯 答對了！位置精確";
                feedback.className = "text-center font-black text-emerald-500 animate__animated animate__heartBeat locked";
            } else {
                combo = 0;
                document.body.classList.remove('combo-active');
                
                // 錯誤特效
                if (el) el.classList.add('wrong-dot');
                mainCard.classList.add('error-shake');
                setTimeout(() => mainCard.classList.remove('error-shake'), 400);

                const correctEl = document.getElementById(`pos-${currentProblem.correctPos}`);
                if (correctEl) correctEl.classList.add('correct-dot');
                
                if (gameMode === 'timed') {
                    const comboEl = document.getElementById('combo-display');
                    comboEl.innerText = "";
                }
                
                feedback.innerText = `💡 差一點點！應有 ${currentProblem.correctPos} 位小數`;
                feedback.className = "text-center font-black text-rose-500 animate__animated animate__shakeX locked";
            }

            setTimeout(() => { 
                feedback.classList.remove('locked'); 
                feedback.innerText = "";
                nextRound(); 
            }, 1200);
        }

        async function endGame() {
            gameActive = false; 
            clearInterval(timerInterval); 
            document.body.classList.remove('combo-active');
            showScreen('result-screen');
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-combo').innerText = maxCombo;
            
            if (score > 3) triggerConfetti();
            analyzePerformanceWithGemini();
        }

        async function analyzePerformanceWithGemini() {
            const aiLoading = document.getElementById('ai-loading');
            const aiText = document.getElementById('ai-text');
            aiLoading.style.display = 'block';
            aiText.innerText = '';

            const stats = `得分: ${score}, 題數: ${totalAnswered}, 連擊: ${maxCombo}`;
            const prompt = `你是一位幽默活潑的國小數學專家。請根據玩家成績給予短評。
            成績：${stats}。如果是高分就誇獎，低分就給一個有趣的小技巧。50字內，繁體中文。`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "表現得很努力，再接再厲喔！";
                
                aiLoading.style.display = 'none';
                aiText.innerText = text;
                document.getElementById('ai-tts-btn').classList.remove('hidden');
            } catch (error) {
                aiLoading.style.display = 'none';
                aiText.innerText = "你是這場挑戰的主角，下一次一定會更好！";
            }
        }

        async function speakAI() {
            const text = document.getElementById('ai-text').innerText;
            if (!text) return;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請用親切開朗的聲音以廣東話讀出：${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                playPCM(pcmData);
            } catch (err) {}
        }

        function playPCM(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const blob = new Blob([createWavHeader(bytes.length, 24000), bytes], { type: 'audio/wav' });
            const audio = new Audio(URL.createObjectURL(blob));
            audio.play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            view.setUint32(0, 0x52494646, false); 
            view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); 
            view.setUint32(12, 0x666d7420, false); 
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true); 
            view.setUint16(22, 1, true); 
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); 
            view.setUint32(40, dataLength, true);
            return buffer;
        }

        function showScreen(id) {
            ['start-screen', 'game-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
