<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級數學：小數點挑戰賽 - 陳俊諺老師製作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --cell-size: 3rem;
        }

        /* 強制置中背景與佈局 */
        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden; 
            transition: background 1.2s ease;
        }

        /* 連擊背景基礎樣式 */
        body.combo-lvl1 { background: radial-gradient(circle, #f5f3ff 0%, #ede9fe 100%); }
        body.combo-lvl2 { background: radial-gradient(circle, #fffbeb 0%, #fef3c7 100%); }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
            max-height: 95vh;
            overflow-y: auto; 
            overflow-x: hidden; 
            scrollbar-width: thin;
        }

        .math-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Roboto Mono', monospace;
            font-size: 3.5rem;
            color: #1e293b;
            gap: 0.25rem;
        }

        .math-row {
            display: flex;
            align-items: center;
            height: 4rem;
            position: relative;
        }

        .digit {
            width: var(--cell-size);
            text-align: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .static-dot {
            position: absolute;
            left: -0.4rem;
            bottom: 0.2rem;
            font-weight: 900;
            color: var(--primary);
            font-size: 2.8rem;
        }

        .dot-trigger {
            position: absolute;
            left: -0.6rem;
            width: 1.2rem;
            height: 100%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .dot-trigger::after {
            content: '';
            width: 12px;
            height: 12px;
            background: #cbd5e1;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 2px;
        }

        .dot-trigger::before {
            content: '▲';
            position: absolute;
            bottom: -42px;
            font-size: 2rem; 
            color: #10b981; 
            opacity: 0;
            transition: all 0.2s;
            transform: translateY(10px);
            text-shadow: 0 2px 6px rgba(16, 185, 129, 0.3);
            pointer-events: none;
        }

        .dot-trigger:hover::after { 
            opacity: 0.7; 
            background: var(--success);
            transform: scale(2.0);
        }
        .dot-trigger:hover::before {
            opacity: 1;
            transform: translateY(0);
            animation: arrowBounce 0.8s infinite;
        }

        @keyframes arrowBounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-12px); }
        }

        .correct-dot::after { 
            opacity: 1 !important; 
            background: var(--success) !important; 
            transform: scale(2.2) !important; 
            box-shadow: 0 0 15px var(--success); 
        }
        .correct-dot::before { display: none !important; } 

        .wrong-dot::after { 
            opacity: 1 !important; 
            background: var(--error) !important; 
            transform: scale(2.2) !important; 
            box-shadow: 0 0 15px var(--error); 
        }
        .wrong-dot::before { display: none !important; }

        .math-line {
            width: 115%;
            height: 5px;
            background: #334155;
            margin: 0.5rem 0;
            border-radius: 10px;
        }

        .operator { position: absolute; left: -3.5rem; color: #94a3b8; font-size: 2.5rem; }

        .timer-progress {
            height: 100%;
            background: linear-gradient(to right, #6366f1, #a855f7);
            transition: width 0.1s linear;
        }

        #feedback.correct {
            color: #059669;
            font-size: 3.5rem;
            text-shadow: 0 0 25px rgba(16, 185, 129, 0.4);
            font-weight: 900;
            white-space: nowrap;
        }

        #feedback.wrong {
            color: #dc2626;
            font-size: 2.5rem;
            font-weight: 800;
            white-space: nowrap;
        }

        .instruction-tag {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: bold;
            color: #64748b;
            font-size: 0.9rem;
        }

        /* 按鈕提示特效 */
        .highlight-btn {
            border-color: #10b981 !important;
            background-color: #ecfdf5 !important;
            color: #065f46 !important;
            box-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
        }

        #name-input-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            z-index: 9999;
            display: none; 
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        #name-input-overlay.active {
            display: flex;
        }

        .glass-card::-webkit-scrollbar {
            width: 4px;
        }
        .glass-card::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4">

    <div id="main-card" class="glass-card rounded-[3rem] p-8 w-full max-w-xl relative">
        
        <div id="game-timer-container" class="hidden absolute top-0 left-0 w-full h-3 bg-slate-100">
            <div id="game-timer-fill" class="timer-progress w-full"></div>
        </div>

        <div id="start-screen" class="text-center space-y-8 py-6">
            <div class="space-y-3">
                <h1 class="text-5xl font-black text-slate-800 tracking-tight">小數點挑戰賽</h1>
                <p class="text-slate-500 font-medium">✨ 機率平衡與生命值機制版</p>
                <div class="inline-block bg-indigo-50 px-6 py-2 rounded-2xl text-base font-bold text-indigo-600 mt-6 shadow-sm">
                    製作人：陳俊諺老師
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-5 pt-4">
                <button onclick="startGame('normal', 5)" class="group flex items-center justify-between bg-white border-2 border-slate-200 p-6 rounded-3xl hover:border-indigo-500 transition-all cursor-pointer">
                    <div class="text-left"><span class="block text-indigo-700 font-bold text-xl">標準練習</span><span class="text-slate-400 text-sm">完成 5 題</span></div>
                    <span class="text-2xl">🎯</span>
                </button>
                <button onclick="startGame('timed', 60)" class="group flex items-center justify-between bg-indigo-600 p-6 rounded-3xl hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200 cursor-pointer">
                    <div class="text-left text-white"><span class="block font-bold text-xl">限時 1 分鐘挑戰</span><span class="text-indigo-100 text-sm">爭奪排行榜榮譽</span></div>
                    <span class="text-2xl text-white">🏆</span>
                </button>
            </div>
        </div>

        <div id="game-screen" class="hidden space-y-6 animate__animated animate__fadeIn">
            <div class="flex justify-between items-end">
                <div>
                    <p id="mode-label" class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-1">MODE</p>
                    <div class="flex items-baseline gap-3">
                        <p id="round-info" class="text-4xl font-black text-slate-800">1 / 5</p>
                        <p id="combo-display" class="text-2xl font-black text-amber-500 hidden"></p>
                    </div>
                    <!-- 生命值顯示區 -->
                    <div id="lives-container" class="mt-2 flex gap-1 text-2xl tracking-widest">
                    </div>
                </div>
                <div class="text-right">
                    <p id="score-label" class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Time</p>
                    <p id="time-display" class="font-mono text-3xl font-black text-indigo-600">60.0s</p>
                </div>
            </div>

            <div class="flex justify-center">
                <div class="instruction-tag">
                    👉 指示：請點擊數字之間的空間來放置小數點
                </div>
            </div>

            <div class="relative w-full">
                <div id="math-area" class="bg-slate-50 rounded-[2.5rem] p-12 border border-slate-200 flex justify-center items-center min-h-[380px] overflow-hidden w-full">
                </div>
                
                <!-- 新增的右下角懸浮膠囊按鈕 -->
                <button id="no-dot-btn" onclick="handleDotClick(null, 0)" class="absolute bottom-6 right-6 bg-white text-slate-600 font-bold px-5 py-3 rounded-full border-2 border-slate-200 hover:border-indigo-500 hover:text-indigo-600 hover:bg-indigo-50 hover:shadow-lg transition-all cursor-pointer flex items-center gap-2 shadow-sm text-sm z-10">
                    ✔️ 答案為整數
                </button>
            </div>

            <div class="text-center">
                <div class="min-h-[90px] flex items-center justify-center overflow-hidden px-4">
                    <span id="feedback" class="animate__animated"></span>
                </div>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center space-y-6 animate__animated animate__fadeIn">
            <h3 class="text-4xl font-black text-slate-800">挑戰結果</h3>
            <div class="bg-white p-6 rounded-[2.5rem] border-2 border-slate-100 grid grid-cols-2 gap-4">
                <div class="bg-indigo-50 rounded-2xl p-4"><p class="text-xs font-bold text-indigo-400">總得分</p><p id="final-score" class="text-4xl font-black text-slate-800">0</p></div>
                <div class="bg-amber-50 rounded-2xl p-4"><p class="text-xs font-bold text-amber-400">最高連擊</p><p id="final-combo" class="text-4xl font-black text-slate-800">0</p></div>
            </div>
            
            <div id="leaderboard-box" class="bg-slate-50 rounded-[2.5rem] p-6 text-left border border-slate-200">
                <h4 class="text-center font-black text-slate-700 mb-4">🏆 限時榮譽榜 (前五名)</h4>
                <div id="leaderboard-list" class="space-y-2 text-sm"></div>
            </div>

            <div class="bg-violet-50 p-6 rounded-[2.5rem] text-left relative">
                <p id="ai-text" class="text-slate-700 text-sm font-medium leading-relaxed"></p>
                <div class="flex justify-between items-center mt-3">
                    <button id="ai-tts-btn" onclick="speakAI()" class="hidden text-xs bg-indigo-600 text-white px-4 py-2 rounded-xl font-bold hover:bg-indigo-700 transition-colors">🔊 AI 老師評點</button>
                    <span class="text-[10px] text-slate-400">Gemini AI 分析</span>
                </div>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-3xl hover:bg-slate-800 cursor-pointer shadow-lg">重新挑戰</button>
        </div>

        <div id="name-input-overlay">
            <div class="bg-white p-10 rounded-[3rem] shadow-2xl border-4 border-indigo-500 space-y-6 w-full max-w-md animate__animated animate__zoomIn">
                <div class="text-center space-y-2">
                    <span class="text-5xl">🎉</span>
                    <h2 class="text-3xl font-black text-slate-800">登入榮譽榜！</h2>
                    <p class="text-slate-500 font-bold">你在本次挑戰中表現優異</p>
                </div>
                <input type="text" id="player-name" placeholder="輸入你的大名" maxlength="10" 
                       class="w-full text-center p-5 border-2 border-slate-200 rounded-3xl text-2xl font-black focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 outline-none transition-all">
                <button onclick="saveAndShowLeaderboard()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-black text-xl py-5 rounded-3xl shadow-lg shadow-indigo-200 transition-all cursor-pointer">
                    確認送出
                </button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let gameMode = 'normal', timeLeft = 60, score = 0, roundCount = 0, maxRounds = 5;
        let combo = 0, maxCombo = 0, currentProblem = null, timerInterval = null, gameActive = false;
        let lives = 5; // 新增生命值變數

        // 更新生命值 UI
        function updateLivesUI() {
            const container = document.getElementById('lives-container');
            let html = '';
            for(let i = 0; i < 5; i++) {
                html += i < lives ? '❤️' : '🤍';
            }
            container.innerHTML = html;
        }

        // 暖色系組合庫
        const warmColors = [
            ['#fff7ed', '#ffedd5', '#fed7aa'], 
            ['#fff1f2', '#ffe4e6', '#fecdd3'], 
            ['#fefce8', '#fef9c3', '#fef08a'], 
            ['#fdf4ff', '#fae8ff', '#f5d0fe'], 
            ['#fffbeb', '#fef3c7', '#fde68a']  
        ];

        function updateBackground() {
            const body = document.body;
            body.classList.remove('combo-lvl1', 'combo-lvl2');
            body.style.background = ""; 

            if (combo >= 10) {
                const set = warmColors[combo % warmColors.length];
                body.style.background = `linear-gradient(135deg, ${set[0]} 0%, ${set[1]} 50%, ${set[2]} 100%)`;
            } else if (combo >= 6) {
                body.classList.add('combo-lvl2');
            } else if (combo >= 3) {
                body.classList.add('combo-lvl1');
            }
        }

        function getLeaderboard() { return JSON.parse(localStorage.getItem('decimal_leaderboard')) || []; }

        function saveAndShowLeaderboard() {
            const name = document.getElementById('player-name').value.trim() || "匿名同學";
            let lb = getLeaderboard();
            lb.push({ name, score, combo: maxCombo });
            lb.sort((a, b) => b.score - a.score);
            localStorage.setItem('decimal_leaderboard', JSON.stringify(lb.slice(0, 5)));
            document.getElementById('name-input-overlay').classList.remove('active');
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const data = getLeaderboard();
            if (data.length === 0) { list.innerHTML = "<p class='text-center text-slate-400 py-4'>暫無數據</p>"; return; }
            let html = `<table class="w-full text-left font-bold text-slate-600">`;
            data.forEach((item, i) => {
                const medals = ['🥇', '🥈', '🥉', '4', '5'];
                html += `<tr class="border-b border-slate-100"><td class="py-2">${medals[i]}</td><td>${item.name}</td><td class="text-right text-indigo-600">${item.score} 分</td></tr>`;
            });
            list.innerHTML = html + `</table>`;
        }

        function triggerConfetti() { confetti({ particleCount: 80, spread: 60, origin: { y: 0.7 } }); }

        // ==========================================
        // 核心更新：平衡的題目生成器 (各 20% 機率)
        // ==========================================
        function generateProblem() {
            // 隨機決定要幾位小數 (0, 1, 2, 3, 4)，每種機率剛好皆為 20%
            const targetDecimals = Math.floor(Math.random() * 5); 
            let topDecimals = 0, bottomDecimals = 0;

            if (targetDecimals > 0) {
                // 將小數位數隨機分配給被乘數和乘數
                topDecimals = Math.floor(Math.random() * (targetDecimals + 1));
                bottomDecimals = targetDecimals - topDecimals;
            }

            // 隨機決定位數長度
            const topDigits = Math.floor(Math.random() * 2) + 2; // 2~3 位數字
            const bottomDigits = Math.floor(Math.random() * 2) + 1; // 1~2 位數字

            // 輔助函式：生成純數字字串，避開無效的尾數 0 導致小數位數計算偏差
            function generateNumberStr(digits, hasDecimals) {
                let numStr = "";
                for (let i = 0; i < digits; i++) {
                    if (i === 0) {
                        numStr += Math.floor(Math.random() * 9 + 1).toString(); // 首位不為 0
                    } else if (i === digits - 1 && hasDecimals) {
                        numStr += Math.floor(Math.random() * 9 + 1).toString(); // 如果有小數，尾數絕對不為 0
                    } else {
                        numStr += Math.floor(Math.random() * 10).toString(); // 中間位數隨機 0-9
                    }
                }
                return numStr;
            }

            let topBaseStr, bottomBaseStr, isZeroEndProd;
            
            // 嚴格確保：如果是有小數點的題目，相乘結果的尾數絕對不能是 0 (避開像 2.5 x 0.4 = 1.00 這種混淆題)
            do {
                topBaseStr = generateNumberStr(topDigits, topDecimals > 0);
                bottomBaseStr = generateNumberStr(bottomDigits, bottomDecimals > 0);
                isZeroEndProd = (targetDecimals > 0) && ((BigInt(topBaseStr) * BigInt(bottomBaseStr)) % 10n === 0n);
            } while (isZeroEndProd);

            // 輔助函式：根據小數位數插入小數點
            function insertDecimal(baseStr, decimals) {
                if (decimals === 0) return baseStr;
                // 如果小數位數大於等於字串長度，需補 0 (例如: 12, 3位小數 -> 0.012)
                if (decimals >= baseStr.length) {
                    return "0." + "0".repeat(decimals - baseStr.length) + baseStr;
                }
                return baseStr.slice(0, baseStr.length - decimals) + "." + baseStr.slice(baseStr.length - decimals);
            }

            const top = insertDecimal(topBaseStr, topDecimals);
            const bottom = insertDecimal(bottomBaseStr, bottomDecimals);

            // 乘積結果 (字串處理)
            const rawProd = (BigInt(topBaseStr) * BigInt(bottomBaseStr)).toString();
            const correctPos = targetDecimals;

            return { top, bottom, rawProd, correctPos };
        }

        function startGame(mode, val) {
            gameMode = mode; gameActive = true; score = 0; roundCount = 0; combo = 0; maxCombo = 0;
            
            // 重置生命值
            lives = 5;
            updateLivesUI();

            if (mode === 'timed') { 
                timeLeft = val; startTimer(); 
                document.getElementById('mode-label').innerText = "限時 1 分鐘挑戰";
                document.getElementById('round-info').innerText = "Score: 0";
                document.getElementById('combo-display').classList.remove('hidden');
                document.getElementById('combo-display').innerText = "";
            } else { 
                maxRounds = val; 
                document.getElementById('mode-label').innerText = "精準練習";
                document.getElementById('round-info').innerText = `1 / ${maxRounds}`;
                document.getElementById('time-display').innerText = "-";
                document.getElementById('combo-display').classList.add('hidden');
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-timer-container').classList.toggle('hidden', mode !== 'timed');
            nextRound();
        }

        function startTimer() {
            const startVal = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) { timeLeft = 0; endGame(); }
                document.getElementById('time-display').innerText = timeLeft.toFixed(1) + 's';
                document.getElementById('game-timer-fill').style.width = (timeLeft / startVal * 100) + '%';
            }, 100);
        }

        function nextRound() {
            if (gameMode === 'normal' && roundCount >= maxRounds) { endGame(); return; }
            roundCount++;
            if (gameMode === 'normal') document.getElementById('round-info').innerText = `${roundCount} / ${maxRounds}`;
            currentProblem = generateProblem();
            renderProblem();
        }

        function renderProblem() {
            const area = document.getElementById('math-area');
            const p = currentProblem;
            const fullProdStr = p.rawProd.padStart(p.correctPos + 1, '0');
            let html = `<div id="math-display" class="math-container animate__animated animate__zoomIn">`;
            html += `<div class="math-row">${renderDigitsWithDot(p.top)}</div>`;
            html += `<div class="math-row"><span class="operator">×</span>${renderDigitsWithDot(p.bottom)}</div>`;
            html += `<div class="math-line"></div><div class="math-row">`;
            const digits = fullProdStr.split('');
            const originalLen = p.rawProd.length;
            digits.forEach((d, i) => {
                const posFromRight = digits.length - i;
                html += `<div class="digit ${i < fullProdStr.length - originalLen ? 'text-slate-300 italic' : ''}">
                            ${posFromRight > 0 ? `<div class="dot-trigger" id="pos-${posFromRight}" onclick="handleDotClick(this, ${posFromRight})"></div>` : ''}
                            ${d}
                         </div>`;
            });
            area.innerHTML = html + `</div></div>`;
        }

        function renderDigitsWithDot(str) {
            const parts = str.split('.');
            let res = "";
            parts[0].split('').forEach(d => { res += `<div class="digit">${d}</div>`; });
            if (parts.length > 1) {
                parts[1].split('').forEach((d, i) => {
                    res += `<div class="digit">${i === 0 ? '<span class="static-dot">.</span>' : ''}${d}</div>`;
                });
            }
            return res;
        }

        function handleDotClick(el, idx) {
            if (!gameActive || document.getElementById('feedback').classList.contains('locked')) return;
            const isCorrect = idx === currentProblem.correctPos;
            const feedback = document.getElementById('feedback');
            feedback.classList.add('locked');

            if (isCorrect) {
                score++; combo++; if (combo > maxCombo) maxCombo = combo;
                if (el) el.classList.add('correct-dot');
                updateBackground(); 
                if (combo >= 3) triggerConfetti();
                feedback.innerText = combo > 1 ? `✨ ${combo} 連擊！ ✨` : "🎯 太棒了！";
                feedback.className = "correct animate__animated animate__heartBeat locked";
                if (gameMode === 'timed') {
                    document.getElementById('round-info').innerText = `Score: ${score}`;
                    document.getElementById('combo-display').innerText = `${combo} Combo`;
                }
                
                setTimeout(() => { 
                    feedback.innerText = ""; 
                    feedback.className = "animate__animated"; 
                    feedback.classList.remove('locked'); 
                    nextRound(); 
                }, 1200);

            } else {
                combo = 0; updateBackground();
                if (el) el.classList.add('wrong-dot');
                
                // 扣除生命值
                lives--;
                updateLivesUI();

                // 若答案應該是整數卻點了小數點，給予按鈕高亮提示
                if (currentProblem.correctPos === 0) {
                    const btn = document.getElementById('no-dot-btn');
                    btn.classList.add('highlight-btn', 'animate__animated', 'animate__headShake');
                    setTimeout(() => btn.classList.remove('highlight-btn', 'animate__animated', 'animate__headShake'), 1200);
                    feedback.innerText = `💡 應是整數 (不需點小數點)`;
                } else {
                    const target = document.getElementById(`pos-${currentProblem.correctPos}`);
                    if (target) target.classList.add('correct-dot');
                    feedback.innerText = `💡 應是 ${currentProblem.correctPos} 位小數`;
                }

                feedback.className = "wrong animate__animated animate__shakeX locked";
                if (gameMode === 'timed') document.getElementById('combo-display').innerText = "";
                
                setTimeout(() => { 
                    feedback.innerText = ""; 
                    feedback.className = "animate__animated"; 
                    feedback.classList.remove('locked'); 

                    // 如果生命值歸零，提早結束遊戲
                    if (lives <= 0) {
                        endGame();
                    } else {
                        nextRound(); 
                    }
                }, 1200);
            }
        }

        function endGame() {
            gameActive = false; clearInterval(timerInterval);
            document.body.className = "";
            document.body.style.background = ""; 
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-combo').innerText = maxCombo;
            showScreen('result-screen');
            if (gameMode === 'timed' && score > 0) {
                document.getElementById('name-input-overlay').classList.add('active');
            } else {
                displayLeaderboard();
            }
            analyzePerformanceWithGemini();
        }

        async function analyzePerformanceWithGemini() {
            const aiText = document.getElementById('ai-text');
            aiText.innerText = "老師正在閱卷中...";
            const prompt = `玩家小數乘法挑戰賽結果：得分${score}，最高連擊${maxCombo}，剩餘生命值${lives}。請用親切的小學老師口吻給予一句廣東話點評，50字內。`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                aiText.innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('ai-tts-btn').classList.remove('hidden');
            } catch (e) { aiText.innerText = "做得好！繼續努力喔！"; }
        }

        async function speakAI() {
            const text = document.getElementById('ai-text').innerText;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `請用廣東話讀出：${text}` }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                playPCM(pcmData);
            } catch (e) {}
        }

        function playPCM(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const blob = new Blob([createWavHeader(bytes.length, 24000), bytes], { type: 'audio/wav' });
            new Audio(URL.createObjectURL(blob)).play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); view.setUint32(40, dataLength, true);
            return buffer;
        }

        function showScreen(id) {
            ['start-screen', 'game-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            document.getElementById('main-card').scrollTop = 0;
        }
    </script>
