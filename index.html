<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五年級數學：小數點挑戰賽 - 陳俊諺老師製作</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&family=Roboto+Mono:wght@500;700&display=swap');
        
        :root {
            --primary: #4f46e5;
            --success: #10b981;
            --error: #ef4444;
            --cell-size: 3rem;
        }

        body { 
            font-family: 'Noto Sans TC', sans-serif;
            background: #f1f5f9;
            overflow: hidden;
            transition: background 0.5s ease;
        }

        body.combo-active {
            background: radial-gradient(circle at center, #eef2ff 0%, #e0e7ff 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.98);
            box-shadow: 0 25px 60px -12px rgba(0, 0, 0, 0.18);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .math-container {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            font-family: 'Roboto Mono', monospace;
            font-size: 3.5rem;
            color: #1e293b;
            gap: 0.25rem;
        }

        .math-row {
            display: flex;
            align-items: center;
            height: 4rem;
            position: relative;
        }

        .digit {
            width: var(--cell-size);
            text-align: center;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .static-dot {
            position: absolute;
            left: -0.4rem;
            bottom: 0.2rem;
            font-weight: 900;
            color: var(--primary);
            font-size: 2.8rem;
        }

        .dot-trigger {
            position: absolute;
            left: -0.5rem;
            width: 1rem;
            height: 100%;
            cursor: pointer;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .dot-trigger::after {
            content: '';
            width: 10px;
            height: 10px;
            background: #cbd5e1;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.2s;
        }

        .dot-trigger:hover::after { opacity: 1; transform: scale(1.2); }
        .correct-dot::after { opacity: 1 !important; background: var(--success) !important; transform: scale(2.2) !important; box-shadow: 0 0 15px var(--success); }
        .wrong-dot::after { opacity: 1 !important; background: var(--error) !important; transform: scale(2.2) !important; box-shadow: 0 0 15px var(--error); }

        .math-line {
            width: 115%;
            height: 5px;
            background: #334155;
            margin: 0.5rem 0;
            border-radius: 10px;
        }

        .operator { position: absolute; left: -3.5rem; color: #94a3b8; font-size: 2.5rem; }

        .timer-progress {
            height: 100%;
            background: linear-gradient(to right, #6366f1, #a855f7);
            transition: width 0.1s linear;
        }

        /* 改強的回饋文字 */
        #feedback.correct {
            color: #059669;
            font-size: 3.5rem;
            text-shadow: 0 0 20px rgba(16, 185, 129, 0.4);
            font-weight: 900;
        }

        #feedback.wrong {
            color: #dc2626;
            font-size: 2.5rem;
            font-weight: 800;
        }

        /* 排行榜表格樣式 */
        .rank-row { border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
        .rank-row:hover { background: #f8fafc; }
        .rank-1 { color: #f59e0b; font-weight: 900; }

        #name-input-container {
            backdrop-filter: blur(8px);
            background: rgba(255, 255, 255, 0.9);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div id="main-card" class="glass-card rounded-[3rem] p-10 w-full max-w-xl relative overflow-hidden">
        
        <div id="game-timer-container" class="hidden absolute top-0 left-0 w-full h-3 bg-slate-100">
            <div id="game-timer-fill" class="timer-progress w-full"></div>
        </div>

        <div id="start-screen" class="text-center space-y-8 py-6">
            <div class="space-y-3">
                <h1 class="text-5xl font-black text-slate-800 tracking-tight">小數點挑戰賽</h1>
                <p class="text-slate-500 font-medium">✨ 視覺強化與排行榜系統</p>
                <div class="inline-block bg-indigo-50 px-6 py-2 rounded-2xl text-base font-bold text-indigo-600 mt-6 shadow-sm">
                    製作人：陳俊諺老師
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-5 pt-4">
                <button onclick="startGame('normal', 5)" class="group flex items-center justify-between bg-white border-2 border-slate-200 p-6 rounded-3xl hover:border-indigo-500 transition-all">
                    <div class="text-left"><span class="block text-indigo-700 font-bold text-xl">標準練習</span><span class="text-slate-400 text-sm">完成 5 題</span></div>
                    <span class="text-2xl">🎯</span>
                </button>
                <button onclick="startGame('timed', 60)" class="group flex items-center justify-between bg-indigo-600 p-6 rounded-3xl hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-200">
                    <div class="text-left text-white"><span class="block font-bold text-xl">限時1分鐘挑戰</span><span class="text-indigo-100 text-sm">爭奪排行榜名次</span></div>
                    <span class="text-2xl text-white">🏆</span>
                </button>
            </div>
        </div>

        <div id="game-screen" class="hidden space-y-8 animate__animated animate__fadeIn">
            <div class="flex justify-between items-end">
                <div>
                    <p id="mode-label" class="text-xs font-black text-indigo-500 uppercase tracking-widest mb-1">MODE</p>
                    <div class="flex items-baseline gap-3">
                        <p id="round-info" class="text-4xl font-black text-slate-800">1 / 5</p>
                        <p id="combo-display" class="text-2xl font-black text-amber-500 hidden"></p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="score-label" class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Time</p>
                    <p id="time-display" class="font-mono text-3xl font-black text-indigo-600">60.0s</p>
                </div>
            </div>

            <div id="math-area" class="bg-slate-50 rounded-[2.5rem] p-12 border border-slate-200 flex justify-center items-center min-h-[400px]">
                </div>

            <div class="space-y-4 text-center">
                <div class="min-h-[100px] flex items-center justify-center">
                    <span id="feedback" class="animate__animated"></span>
                </div>
                <button id="no-dot-btn" onclick="handleDotClick(null, 0)" class="w-full py-5 bg-white text-slate-600 font-bold rounded-3xl border-2 border-slate-200 hover:border-indigo-400 transition-all">
                    結果為整數 (不需點小數點)
                </button>
            </div>
        </div>

        <div id="result-screen" class="hidden text-center space-y-6">
            <h3 class="text-4xl font-black text-slate-800">挑戰結果</h3>
            
            <div class="bg-white p-6 rounded-[2.5rem] border-2 border-slate-100 grid grid-cols-2 gap-4">
                <div><p class="text-xs font-bold text-indigo-400">總得分</p><p id="final-score" class="text-4xl font-black text-slate-800">0</p></div>
                <div><p class="text-xs font-bold text-indigo-400">最高連擊</p><p id="final-combo" class="text-4xl font-black text-slate-800">0</p></div>
            </div>

            <div id="leaderboard-box" class="bg-slate-50 rounded-[2.5rem] p-6 text-left border border-slate-200">
                <h4 class="text-center font-black text-slate-700 mb-4 flex items-center justify-center gap-2">
                    🏆 限時模式榮譽榜
                </h4>
                <div id="leaderboard-list" class="space-y-2 text-sm">
                    </div>
            </div>

            <div id="ai-analysis-box" class="bg-violet-50 p-6 rounded-[2.5rem] text-left">
                <p id="ai-text" class="text-slate-700 text-sm font-medium leading-relaxed"></p>
                <button id="ai-tts-btn" onclick="speakAI()" class="hidden mt-3 text-xs bg-indigo-600 text-white px-3 py-1.5 rounded-xl font-bold">🔊 AI 老師評點</button>
            </div>

            <button onclick="location.reload()" class="w-full bg-slate-900 text-white font-bold py-5 rounded-3xl hover:bg-slate-800">重新挑戰</button>
        </div>

        <div id="name-input-container" class="hidden absolute inset-0 z-50 flex flex-col items-center justify-center p-8 text-center">
            <div class="bg-white p-8 rounded-[3rem] shadow-2xl border-2 border-indigo-500 space-y-6 w-full animate__animated animate__zoomIn">
                <h2 class="text-3xl font-black text-slate-800">新紀錄！</h2>
                <p class="text-slate-500">請輸入你的名字記錄在榮譽榜：</p>
                <input type="text" id="player-name" placeholder="例如：5A 陳小明" maxlength="10" 
                       class="w-full text-center p-4 border-2 border-slate-200 rounded-2xl text-xl font-bold focus:border-indigo-500 focus:outline-none">
                <button onclick="saveAndShowLeaderboard()" class="w-full bg-indigo-600 text-white font-bold py-4 rounded-2xl hover:bg-indigo-700 transition-all">送出成績</button>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; 
        let gameMode = 'normal', timeLeft = 60, score = 0, totalAnswered = 0, roundCount = 0, maxRounds = 5;
        let combo = 0, maxCombo = 0;
        let currentProblem = null, timerInterval = null, gameActive = false;
        let history = [];

        // 初始化與讀取排行榜
        function getLeaderboard() {
            return JSON.parse(localStorage.getItem('decimal_leaderboard')) || [];
        }

        function saveAndShowLeaderboard() {
            const name = document.getElementById('player-name').value.trim() || "無名英雄";
            let leaderboard = getLeaderboard();
            leaderboard.push({ name: name, score: score, combo: maxCombo, date: new Date().toLocaleDateString() });
            leaderboard.sort((a, b) => b.score - a.score);
            leaderboard = leaderboard.slice(0, 5); // 只留前五名
            localStorage.setItem('decimal_leaderboard', JSON.stringify(leaderboard));
            
            document.getElementById('name-input-container').classList.add('hidden');
            displayLeaderboard();
        }

        function displayLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const data = getLeaderboard();
            if (data.length === 0) {
                list.innerHTML = "<p class='text-center text-slate-400'>尚無紀錄</p>";
                return;
            }
            let html = `<table class="w-full text-left">
                <tr class="text-slate-400 text-xs"><th>名次</th><th>玩家</th><th class="text-right">得分</th></tr>`;
            data.forEach((item, index) => {
                const medals = ['🥇', '🥈', '🥉', '4', '5'];
                html += `<tr class="rank-row h-10 ${index === 0 ? 'rank-1' : ''}">
                    <td>${medals[index]}</td>
                    <td>${item.name}</td>
                    <td class="text-right font-bold text-indigo-600">${item.score}</td>
                </tr>`;
            });
            html += `</table>`;
            list.innerHTML = html;
        }

        function triggerConfetti() {
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#4f46e5', '#10b981', '#fbbf24'] });
        }

        function generateProblem() {
            const isSpecial = Math.random() < 0.35;
            let top, bottom;
            if (isSpecial) {
                const pairs = [[25, 4], [125, 8], [5, 2], [15, 6], [75, 4]];
                const pair = pairs[Math.floor(Math.random() * pairs.length)];
                const d1 = Math.floor(Math.random() * 3), d2 = Math.floor(Math.random() * 3) + 1;
                top = (pair[0] / Math.pow(10, d1)).toString();
                bottom = (pair[1] / Math.pow(10, d2)).toString();
            } else {
                top = (Math.floor(Math.random() * 900 + 10) / 100).toString();
                bottom = (Math.floor(Math.random() * 90 + 2) / 10).toString();
            }
            const sTop = top.replace('.', ''), sBottom = bottom.replace('.', '');
            const rawProd = (BigInt(sTop) * BigInt(sBottom)).toString();
            const correctPos = (top.split('.')[1] || "").length + (bottom.split('.')[1] || "").length;
            return { top, bottom, rawProd, correctPos };
        }

        function startGame(mode, val) {
            gameMode = mode; gameActive = true; score = 0; totalAnswered = 0; roundCount = 0; combo = 0; maxCombo = 0;
            if (mode === 'timed') { 
                timeLeft = val; maxRounds = 999; startTimer(); 
                document.getElementById('mode-label').innerText = "限時1分鐘挑戰";
                document.getElementById('round-info').innerText = "Score: 0";
                document.getElementById('combo-display').classList.remove('hidden');
            } else { 
                maxRounds = val; 
                document.getElementById('mode-label').innerText = "精準練習";
                document.getElementById('round-info').innerText = `1 / ${maxRounds}`;
                document.getElementById('time-display').innerText = "-";
            }
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-screen').classList.remove('hidden');
            document.getElementById('game-timer-container').classList.toggle('hidden', mode !== 'timed');
            nextRound();
        }

        function startTimer() {
            const startVal = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) { timeLeft = 0; endGame(); }
                document.getElementById('time-display').innerText = timeLeft.toFixed(1) + 's';
                document.getElementById('game-timer-fill').style.width = (timeLeft / startVal * 100) + '%';
            }, 100);
        }

        function nextRound() {
            if (gameMode === 'normal' && roundCount >= maxRounds) { endGame(); return; }
            roundCount++;
            if (gameMode === 'normal') document.getElementById('round-info').innerText = `${roundCount} / ${maxRounds}`;
            currentProblem = generateProblem();
            renderProblem();
        }

        function renderProblem() {
            const area = document.getElementById('math-area');
            const p = currentProblem;
            const fullProdStr = p.rawProd.padStart(p.correctPos + 1, '0');
            const originalLen = p.rawProd.length;

            let html = `<div id="math-display" class="math-container animate__animated animate__zoomIn">`;
            html += `<div class="math-row">${renderDigitsWithDot(p.top)}</div>`;
            html += `<div class="math-row"><span class="operator">×</span>${renderDigitsWithDot(p.bottom)}</div>`;
            html += `<div class="math-line"></div><div class="math-row">`;
            const digits = fullProdStr.split('');
            digits.forEach((d, i) => {
                const posFromRight = digits.length - i;
                html += `<div class="digit ${i < fullProdStr.length - originalLen ? 'zero-pad' : ''}">
                            ${posFromRight > 0 ? `<div class="dot-trigger" id="pos-${posFromRight}" onclick="handleDotClick(this, ${posFromRight})"></div>` : ''}
                            ${d}
                         </div>`;
            });
            html += `</div></div>`;
            area.innerHTML = html;
        }

        function renderDigitsWithDot(str) {
            const parts = str.split('.');
            let res = "";
            parts[0].split('').forEach(d => { res += `<div class="digit">${d}</div>`; });
            if (parts.length > 1) {
                parts[1].split('').forEach((d, i) => {
                    res += `<div class="digit">${i === 0 ? '<span class="static-dot">.</span>' : ''}${d}</div>`;
                });
            }
            return res;
        }

        function handleDotClick(el, idx) {
            if (!gameActive || document.getElementById('feedback').classList.contains('locked')) return;
            const isCorrect = idx === currentProblem.correctPos;
            const feedback = document.getElementById('feedback');
            feedback.classList.add('locked');

            if (isCorrect) {
                score++; combo++; if (combo > maxCombo) maxCombo = combo;
                if (el) el.classList.add('correct-dot');
                if (combo >= 3) { triggerConfetti(); document.body.classList.add('combo-active'); }
                feedback.innerText = combo > 1 ? `✨ ${combo} COMBO！` : "🎯 正確！";
                feedback.className = "correct animate__animated animate__bounceIn locked";
                if (gameMode === 'timed') document.getElementById('round-info').innerText = `Score: ${score}`;
            } else {
                combo = 0; document.body.classList.remove('combo-active');
                if (el) el.classList.add('wrong-dot');
                document.getElementById(`pos-${currentProblem.correctPos}`).classList.add('correct-dot');
                feedback.innerText = "💡 位置不對喔";
                feedback.className = "wrong animate__animated animate__shakeX locked";
            }

            setTimeout(() => { feedback.innerText = ""; feedback.classList.remove('locked'); nextRound(); }, 1200);
        }

        function endGame() {
            gameActive = false; clearInterval(timerInterval);
            document.body.classList.remove('combo-active');
            
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-combo').innerText = maxCombo;
            
            showScreen('result-screen');
            
            if (gameMode === 'timed') {
                document.getElementById('name-input-container').classList.remove('hidden');
            } else {
                displayLeaderboard();
            }
            analyzePerformanceWithGemini();
        }

        async function analyzePerformanceWithGemini() {
            const aiText = document.getElementById('ai-text');
            const prompt = `玩家小數乘法得分: ${score}, 連擊: ${maxCombo}。請給予簡短鼓勵與建議，廣東話口吻，50字內。`;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const data = await response.json();
                aiText.innerText = data.candidates[0].content.parts[0].text;
                document.getElementById('ai-tts-btn').classList.remove('hidden');
            } catch (e) { aiText.innerText = "好棒的嘗試！再接再厲！"; }
        }

        async function speakAI() {
            const text = document.getElementById('ai-text').innerText;
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `用廣東話讀出：${text}` }] }],
                        generationConfig: { responseModalities: ["AUDIO"], speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } } }
                    })
                });
                const result = await response.json();
                const pcmData = result.candidates[0].content.parts[0].inlineData.data;
                playPCM(pcmData);
            } catch (e) {}
        }

        function playPCM(base64Data) {
            const binaryString = atob(base64Data);
            const bytes = new Uint8Array(binaryString.length);
            for (let i = 0; i < binaryString.length; i++) bytes[i] = binaryString.charCodeAt(i);
            const blob = new Blob([createWavHeader(bytes.length, 24000), bytes], { type: 'audio/wav' });
            new Audio(URL.createObjectURL(blob)).play();
        }

        function createWavHeader(dataLength, sampleRate) {
            const buffer = new ArrayBuffer(44);
            const view = new DataView(buffer);
            view.setUint32(0, 0x52494646, false); view.setUint32(4, 36 + dataLength, true);
            view.setUint32(8, 0x57415645, false); view.setUint32(12, 0x666d7420, false);
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true); view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            view.setUint32(36, 0x64617461, false); view.setUint32(40, dataLength, true);
            return buffer;
        }

        function showScreen(id) {
            ['start-screen', 'game-screen', 'result-screen'].forEach(s => document.getElementById(s).classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }
    </script>
</body>
</html>
